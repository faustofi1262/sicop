<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Ingreso de Requerimiento - SICOP</title>
   <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
   <link rel="stylesheet" href="{{ url_for('static', filename='css/sicop.css') }}">
</head>
<body>
<div class="container mt-5">
    <div class="card shadow p-4">
        <h3 class="font-weight-bold">📋 Ingreso de Requerimiento</h3>

        <form method="POST" action="/requerimientos/guardar">

            {% if requerimiento %}
                <input type="hidden" name="id" value="{{ requerimiento.id }}">
            {% endif %}

            <h5 class="text-primary border-bottom pb-1 mb-3">
                Datos del requerimiento
            </h5>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Memorando Requirente</label>
                    <input type="text"
                           name="mem_requi"
                           class="form-control"
                           value="{{ requerimiento.mem_requi if requerimiento else '' }}">
                </div>

                <div class="form-group col-md-6">
                    <label>Fecha Memorando Requirente</label>
                    <input type="date"
                           name="fecha_memo_requi"
                           class="form-control"
                           value="{{ requerimiento.fecha_memo_requi.strftime('%Y-%m-%d') if requerimiento and requerimiento.fecha_memo_requi else '' }}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-6">
                    <label>Unidad Requirente</label>
                    <select name="unid_requirente" class="form-control" required>
                        <option value="">Seleccione una unidad</option>
                        {% for u in unidades %}
                            <option value="{{ u[0] }}"
                                {% if requerimiento and u[0] == requerimiento.unid_requirente %}selected{% endif %}>
                                {{ u[1] }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label>Funcionario Encargado</label>
                    <select name="funcionario_encargado" class="form-control" required>
                        <option value="">Seleccione funcionario</option>
                        {% for f in funcionarios %}
                            <option value="{{ f[0] }}"
                                {% if requerimiento and f[0] == requerimiento.funcionario_encargado %}selected{% endif %}>
                                {{ f[0] }}
                            </option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <hr>

            <h5class="text-primary border-bottom pb-1 mt-4 mb-3">
                Memorandos administrativos</h5>
            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Memo Vice Administrativo</label>
                    <input type="text"
                           name="memo_vice_ad"
                           class="form-control"
                           value="{{ requerimiento.memo_vice_ad if requerimiento else '' }}">
                </div>

                <div class="form-group col-md-6">
                    <label>Fecha Memo Vice Administrativo</label>
                    <input type="date"
                           name="fecha_memo_vice_ad"
                           class="form-control"
                           value="{{ requerimiento.fecha_memo_vice_ad.strftime('%Y-%m-%d') if requerimiento and requerimiento.fecha_memo_vice_ad else '' }}">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group col-md-6">
                    <label>Memo Director Administrativo</label>
                    <input type="text"
                           name="memo_dir_ad"
                           class="form-control"
                           value="{{ requerimiento.memo_dir_ad if requerimiento else '' }}">
                </div>

                <div class="form-group col-md-6">
                    <label>Fecha Memo Director Administrativo</label>
                    <input type="date"
                           name="fecha_memo_dir_ad"
                           class="form-control"
                           value="{{ requerimiento.fecha_memo_dir_ad.strftime('%Y-%m-%d') if requerimiento and requerimiento.fecha_memo_dir_ad else '' }}">
                </div>
            </div>

            <div class="row">
                <div class="col-md-3">
                    <label>Fecha de Recepción</label>
                    <input type="date"
                           name="fecha_recep_req"
                           class="form-control form-control-sm"
                           value="{{ requerimiento.fecha_recep_req.strftime('%Y-%m-%d') if requerimiento and requerimiento.fecha_recep_req else '' }}">
                </div>

                <div class="col-md-3">
                    <label>Monto Requerido</label>
                    <input type="number"
                           step="0.01"
                           name="monto_req"
                           class="form-control form-control-sm"
                           value="{{ requerimiento.monto_req if requerimiento else '' }}">
                </div>
            </div>

            <hr>

            <h5>Descripción y presupuesto</h5>
            <div class="row">
                <div class="col-md-4">
                    <label>Breve descripción</label>
                    <select name="breve_descr" class="form-control form-control-sm">
                        <option value="">Seleccione</option>
                        {% for v in ['Bien','Servicio','Obra','Consultoría'] %}
                            <option value="{{ v }}"
                                {% if requerimiento and requerimiento.breve_descr == v %}selected{% endif %}>
                                {{ v }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-8">
                    <label>Descripción</label>
                    <textarea name="descripcion"
                              class="form-control"
                              rows="4"
                              placeholder="Describa el objeto del requerimiento">{{ requerimiento.descripcion if requerimiento else '' }}</textarea>
                </div>
            </div>

            <div class="mt-4">
                <button type="submit" class="btn btn-primary">
                    💾 Guardar Requerimiento
                </button>
                <a href="/requerimientos" class="btn btn-secondary">
                    ⬅ Volver
                </a>
            </div>

        </form>
    </div>
</div>

</body>
</html>
