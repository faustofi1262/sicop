<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Rol - SICOP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">
    <h2>✏️ Editar Rol de Usuario</h2>

    <form method="POST">
        <div class="form-group">
            <label>Usuario</label>
            <input type="text" class="form-control" value="{{ usuario.usuario }}" disabled>
        </div>

        <div class="form-group">
            <label>Rol</label>
            <select name="rol" class="form-control" required>
                <option value="Administrador" {% if usuario.rol == "Administrador" %}selected{% endif %}>Administrador</option>
                <option value="Analista" {% if usuario.rol == "Analista" %}selected{% endif %}>Analista</option>
                <option value="Usuario" {% if usuario.rol == "Usuario" %}selected{% endif %}>Usuario</option>
            </select>
        </div>

        <button type="submit" class="btn btn-primary">Guardar cambios</button>
        <a href="/admin/usuarios" class="btn btn-secondary">Cancelar</a>
    </form>
</div>

</body>
</html>
