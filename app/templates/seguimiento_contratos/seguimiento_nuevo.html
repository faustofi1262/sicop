{% extends "base.html" %}

{% block content %}

<style>
.form-page {
    max-width: 1100px;
    margin: 30px auto;
}

.form-title {
    font-size: 34px;
    font-weight: 700;
    margin-bottom: 25px;
}

.card-sicop {
    background: #fff;
    border: 1px solid #d9dee7;
    border-radius: 12px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.08);
    margin-bottom: 22px;
}

.card-header-sicop {
    padding: 14px 20px;
    background: #0d6efd;
    color: white;
    font-size: 20px;
    font-weight: 700;
    border-radius: 12px 12px 0 0;
}

.card-body-sicop {
    padding: 22px;
}

.form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px 28px;
}

.form-group label {
    font-weight: 600;
    margin-bottom: 6px;
    display: block;
}

.form-control {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid #cfd6df;
    border-radius: 7px;
    font-size: 15px;
}

.full-width {
    grid-column: 1 / 3;
}

.actions {
    display: flex;
    justify-content: space-between;
    margin-top: 25px;
}

.btn-sicop {
    border: none;
    border-radius: 7px;
    padding: 11px 22px;
    font-size: 16px;
    cursor: pointer;
    text-decoration: none;
}

.btn-back {
    background: #6c757d;
    color: white;
}

.btn-save {
    background: #198754;
    color: white;
}
</style>

<div class="form-page">

    <div class="form-title">➕ Nuevo Seguimiento</div>

    <form method="POST"
      enctype="multipart/form-data"
      action="{{ url_for('main.seguimiento_guardar', contrato_id=contrato_id) }}">

        <div class="card-sicop">
            <div class="card-header-sicop">
                📋 Datos del Seguimiento
            </div>

            <div class="card-body-sicop">
                <div class="form-grid">

                    <div class="form-group">
                        <label>Fecha de Seguimiento</label>
                        <input type="date" name="fecha_seguimiento" class="form-control" required>
                    </div>

                    <div class="form-group">

                        <label>Tipo de Gestión</label>

                        <select name="tipo_gestion"
                                id="tipo_gestion"
                                class="form-control">

                            <option value="Correo">Correo</option>
                            <option value="Memorando">Memorando</option>
                            <option value="Llamada">Llamada</option>
                            <option value="Reunión">Reunión</option>
                            <option value="Solicitud de Información">Solicitud de Información</option>
                            <option value="Informe Recibido">Informe Recibido</option>
                            <option value="Acta">Acta</option>

                        </select>

                    </div>

                    <div class="form-group full-width" id="grupo_memorando" style="display:none;">
                        <label>Número de Memorando</label>
                        <input type="text"
                            name="numero_memorando"
                            id="numero_memorando"
                            class="form-control"
                            placeholder="Ej: UTMACH-UCP-2026-00123-M">
                    </div>

                    <div class="form-group full-width" id="grupo_archivo" style="display:none;">
                        <label>Adjuntar Memorando (PDF)</label>
                        <input type="file"
                            name="archivo_memorando"
                            accept=".pdf"
                            class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Fecha Compromiso / Fecha límite</label>
                        <input type="date"
                            name="fecha_compromiso"
                            class="form-control">
                    </div>

                    <div class="form-group">
                        <label>Estado</label>
                        <select name="estado" class="form-control">
                            <option value="PENDIENTE">PENDIENTE</option>
                            <option value="EN PROCESO">EN PROCESO</option>
                            <option value="ATENDIDO">ATENDIDO</option>
                            <option value="VENCIDO">VENCIDO</option>
                        </select>
                    </div>

                    <div class="form-group full-width">
                        <label>Descripción de la gestión realizada</label>
                        <textarea name="descripcion" class="form-control" rows="4"
                                  placeholder="Ejemplo: Se solicitó al administrador del contrato remitir informe de avance de ejecución contractual."></textarea>
                    </div>

                    <div class="form-group full-width">
                        <label>Compromiso / Información solicitada</label>
                        <textarea name="compromiso" class="form-control" rows="4"
                                  placeholder="Ejemplo: Remitir informe técnico, acta de entrega recepción, evidencia de cumplimiento o documentación pendiente."></textarea>
                    </div>

                </div>
            </div>
        </div>

        <div class="actions">
            <a href="{{ url_for('main.seguimiento_contratos_detalle', contrato_id=contrato_id) }}"
               class="btn-sicop btn-back">
                ⬅ Volver
            </a>

            <button type="submit" class="btn-sicop btn-save">
                💾 Guardar Seguimiento
            </button>
        </div>

    </form>

</div>
<script>

document.addEventListener("DOMContentLoaded", function() {

    const tipo = document.getElementById("tipo_gestion");
    const grupoMemorando = document.getElementById("grupo_memorando");
    const grupoArchivo = document.getElementById("grupo_archivo");

    function verificarTipo() {

    if (tipo.value === "Memorando") {

        grupoMemorando.style.display = "block";
        grupoArchivo.style.display = "block";

    } else {

        grupoMemorando.style.display = "none";
        grupoArchivo.style.display = "none";

    }
}
verificarTipo();

tipo.addEventListener("change", verificarTipo);

});

</script>

{% endblock %}
