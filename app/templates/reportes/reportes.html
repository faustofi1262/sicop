{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3><b>📊 Módulo de Reportes</b></h3>

        <a href="{{ url_for('main.panel_principal') }}" class="btn btn-secondary">
            ⬅ Volver
        </a>
    </div>

    <!-- PRIMER REPORTE -->
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            📋 Reporte de procesos por período
        </div>

        <div class="card-body">
            <form method="GET"
                  action="{{ url_for('main.reporte_procesos_periodo_pdf') }}"
                  target="_blank">

                <div class="row">

                    <div class="col-md-4">
                        <label>Fecha inicio</label>
                        <input type="date"
                               name="fecha_desde"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-4">
                        <label>Fecha fin</label>
                        <input type="date"
                               name="fecha_hasta"
                               class="form-control"
                               required>
                    </div>

                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit"
                                class="btn btn-danger btn-block">
                            📄 Generar PDF
                        </button>
                    </div>

                </div>
            </form>
        </div>
    </div>


    <!-- SEGUNDO REPORTE -->
    <div class="card shadow mt-4">

        <div class="card-header bg-primary text-white">
            📥 Procesos ingresados a la Unidad de Compras Públicas
        </div>

        <div class="card-body">

            <form method="GET"
                  action="{{ url_for('main.reporte_procesos_ingresados_pdf') }}"
                  target="_blank">

                <div class="row">

                    <div class="col-md-3">
                        <label>Fecha inicio</label>
                        <input type="date"
                            name="fecha_desde"
                            class="form-control"
                            required>
                    </div>

                    <div class="col-md-3">
                        <label>Fecha fin</label>
                        <input type="date"
                            name="fecha_hasta"
                            class="form-control"
                            required>
                    </div>

                    <div class="col-md-3">
                        <label>Unidad requirente</label>

                        <select name="unidad_id" class="form-control">
                            <option value="">Todas las unidades</option>

                            {% for unidad in unidades %}
                                <option value="{{ unidad[0] }}">
                                    {{ unidad[1] }}
                                </option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-3 d-flex align-items-end">
                        <button type="submit"
                                class="btn btn-primary btn-block">
                            📄 Generar PDF
                        </button>
                    </div>

                </div>

            </form>

        </div>
    </div>

</div>

{% endblock %}
