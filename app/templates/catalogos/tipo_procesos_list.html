{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>📋 Tipos de Proceso</h2>

        <div>
            <a href="/admin" class="btn btn-secondary">
                ⬅ Volver al Panel
            </a>

            <a href="{{ url_for('main.tipo_procesos_nuevo') }}" class="btn btn-primary">
                ➕ Nuevo Tipo
            </a>
        </div>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">

            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                    <tr>
                        <th width="80">ID</th>
                        <th>Tipo de Proceso</th>
                        <th width="200">Acciones</th>
                    </tr>
                </thead>

                <tbody>
                    {% for t in tipos %}
                    <tr>
                        <td>{{ t[0] }}</td>
                        <td>{{ t[1] }}</td>
                        <td>
                            <a href="{{ url_for('main.tipo_procesos_editar', id=t[0]) }}"
                               class="btn btn-warning btn-sm">
                                ✏️ Editar
                            </a>

                            <a href="{{ url_for('main.tipo_procesos_eliminar', id=t[0]) }}"
                               class="btn btn-danger btn-sm"
                               onclick="return confirm('¿Eliminar tipo de proceso?')">
                                🗑 Eliminar
                            </a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

        </div>
    </div>

</div>

{% endblock %}
