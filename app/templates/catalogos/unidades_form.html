{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm">

        <div class="card-header bg-primary text-white">
            {% if unidad %}
                ✏️ Editar Unidad Requirente
            {% else %}
                🏢 Nueva Unidad Requirente
            {% endif %}
        </div>

        <div class="card-body">

            <form method="POST"
                  action="{% if unidad %}{{ url_for('main.unidades_actualizar', id=unidad[0]) }}{% else %}{{ url_for('main.unidades_guardar') }}{% endif %}">

                <div class="mb-3">
                    <label class="form-label">
                        Nombre de la Unidad
                    </label>

                    <input type="text"
                           name="nombre_unidad"
                           class="form-control"
                           required
                           value="{{ unidad[1] if unidad else '' }}">
                </div>

                <div class="d-flex justify-content-between">

    <a href="{{ url_for('main.unidades_listar') }}"
       class="btn btn-secondary">
        ⬅ Volver
    </a>

    <button type="submit" class="btn btn-success">
        💾 Guardar
    </button>

</div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
